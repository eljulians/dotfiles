# Alacritty configuration
# Managed by Home Manager (symlinked to ~/.config/alacritty/alacritty.toml)

[env]
TERM = "xterm-256color"

[window]
padding = { x = 8, y = 8 }
opacity = 0.95
dynamic_title = true

[scrolling]
history = 10000

[font]
size = 12.0

[font.normal]
family = "Inconsolata Nerd Font"
style = "Regular"

[font.bold]
family = "Inconsolata Nerd Font"
style = "Bold"

[font.italic]
family = "Inconsolata Nerd Font"
style = "Italic"

[cursor]
style = { shape = "Block", blinking = "On" }

# Tokyo Night color scheme
[colors.primary]
background = "#1a1b26"
foreground = "#c0caf5"

[colors.normal]
black   = "#15161e"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#a9b1d6"

[colors.bright]
black   = "#414868"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#c0caf5"
